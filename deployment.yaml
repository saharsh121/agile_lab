apiVersion: apps/v1
kind: Deployment
metadata:
  name: agile-lab-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agile
  template:
    metadata:
      labels:
        app: agile-lab
    spec:
      containers:
      - name: agile-container
        image: saharsh1211/agile:latest